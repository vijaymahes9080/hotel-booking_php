<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- The above 3 meta tags *must* come first in the head; any other head content must come *after* these tags -->
    <title>Hotel Booking</title>

    <!-- Bootstrap -->
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="http://www.w3schools.com/lib/w3.css">
    
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.12.1/themes/base/jquery-ui.css">
    <style>
        .well {
            background: rgba(0, 0, 0, 0.7);
            border: none;
            height: 200px;
        }
        
        body {
            background-image: url('images/home_bg.jpg');
            background-repeat: no-repeat;
            background-attachment: fixed;
        }
        
        h4 {
            color: #ffbb2b;
        }
        h6
        {
            color: navajowhite;
            font-family:  monospace;
        }
        label
        {
            color:#ffbb2b;
            font-size: 13px;
            font-weight: 100;
        }
    </style>
</head>

<body>
    <div class="container">
      
       <img class="img-responsive" src="images/home_banner.jpg" style="width:100%; height:180px;">      
        <nav class="navbar navbar-inverse">
            <div class="container-fluid">
                <ul class="nav navbar-nav">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="room.html">Room &amp; Facilities</a></li>
                    <li class="active"><a href="reservation.html">Online Reservation</a></li>
                    <li><a href="review.html">Review</a></li>
                    <li><a href="admin.html">Admin</a></li>
                </ul>
                <ul class="nav navbar-nav navbar-right">
                    <li><a href="http://www.facebook.com"><img src="images/facebook.png"></a></li>
                    <li><a href="http://www.twitter.com"><img src="images/twitter.png"></a></li>                    
                </ul>
            </div>
        </nav>
        
       <div class='row'>
        <div class='col-md-4'></div>
        <div class='col-md-5 well'>
         <form action="" method="post" name="room_category" id="availability-form">
               
               <div class="form-group">
                    <label for="checkin">Check In :</label>&nbsp;&nbsp;&nbsp;
                    <input type="text" class="datepicker" name="checkin" id="checkin" required>
                </div>
               
               <div class="form-group">
                    <label for="checkout">Check Out:</label>&nbsp;&nbsp;
                    <input type="text" class="datepicker" name="checkout" id="checkout" required>
                </div>
                 
               &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
                <button type="submit" class="btn btn-primary button" name="submit">Check Availability</button>
            </form>
           </div>
           <div class="col-md-3"></div>
        </div> 

        <div id="availability-results">
            <!-- Available categories will be rendered here -->
        </div>

    </div>
    
    <!-- jQuery and jQuery UI -->
    <script src="https://code.jquery.com/jquery-1.12.4.js"></script>
    <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/db.js"></script>
    <script>
        $( function() {
            $( ".datepicker" ).datepicker({
                dateFormat : 'yy-mm-dd'
            });

            $('#availability-form').on('submit', function(e) {
                e.preventDefault();
                var checkin = $('#checkin').val();
                var checkout = $('#checkout').val();
                if(!checkin || !checkout) {
                    alert("Please select dates first.");
                    return;
                }

                var results = db.check_available(checkin, checkout);
                var container = $('#availability-results');
                container.empty();

                if(results && results.length > 0)
                {
                    results.forEach(function(row2) {
                        var html = `
                            <div class='row'>
                                <div class='col-md-4'></div>
                                <div class='col-md-5 well'>
                                    <h4>${row2.roomname}</h4><hr>
                                    <h6>No of Beds: ${row2.no_bed} ${row2.bedtype} bed.</h6>
                                    <h6>Available Rooms: ${row2.available}</h6>
                                    <h6>Facilities: ${row2.facility}</h6>
                                    <h6>Price: ${row2.price} tk/night.</h6>
                                </div>
                                <div class='col-md-3'>
                                    <a href='./booknow.html?roomname=${encodeURIComponent(row2.roomname)}&checkin=${checkin}&checkout=${checkout}'><button class='btn btn-primary button'>Book Now</button></a>
                                </div>   
                            </div>
                        `;
                        container.append(html);
                    });
                }
                else
                {
                    container.append('<div class="row"><div class="col-md-12 text-center" style="color: white; margin-top: 20px;"><h4>No Rooms Available for the selected dates</h4></div></div>');
                }
            });
        });
    </script>
</body>

</html>
