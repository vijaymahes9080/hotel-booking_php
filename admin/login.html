<!DOCTYPE html>
<html lang="en">

<head>
    <title>Admin Panel</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="../css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/login.css" type="text/css">
</head>

<body>
    <div class="container">
        <div class="jumbotron">
            <h2>Log In</h2>
            <hr>
            <form action="" method="post" name="login" id="login-form">
                <div class="form-group">
                    <label for="emailusername">Username or Email:</label>
                    <input type="text" name="emailusername" id="emailusername" class="form-control" value="admin" required>
                </div>
                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" name="password" id="password" class="form-control" value="1234" required>
                </div>
                <!--For showing error for wrong input  -->
                <p id="wrong_id" style="color:red; font-size:12px;"></p>

                <button type="submit" name="submit" class="btn btn-lg btn-primary btn-block">Submit</button>
                
                <br>
                <p style="text-align: center; font-size: 14px;"><a href="../index.html">Back To Home</a></p>
            </form>
        </div>
    </div>

    <!-- jQuery -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.1.1/jquery.min.js"></script>
    <script src="../js/db.js"></script>
    <script>
        $(document).ready(function() {
            $('#login-form').on('submit', function(e) {
                e.preventDefault();
                var emailusername = $('#emailusername').val();
                var password = $('#password').val();

                if (!emailusername || !password) {
                    alert("Please fill in both fields.");
                    return;
                }

                if (db.check_login(emailusername, password)) {
                    window.location.href = "../admin.html";
                } else {
                    $('#wrong_id').text("Wrong username or password");
                }
            });
        });
    </script>
</body>

</html>
