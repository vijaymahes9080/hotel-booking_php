<!DOCTYPE html>
<html lang="en">

<head>
    <title>Admin Panel</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/reg.css" type="text/css">
</head>

<body>
    <div class="container">
        <div class="well">
            <h2>Edit Room Category</h2>
            <hr>
            <form action="" method="post" name="room_category" id="edit-room-form">
                <div class="form-group">
                    <label for="roomname">Room Type Name:</label>
                    <input type="text" class="form-control" name="roomname" id="roomname" required>
                </div>
                 <div class="form-group">
                    <label for="qty">No of Rooms:</label>&nbsp;
                    <select class="form-control" name="room_qnty" id="room_qnty" style="display:inline-block; width:auto;">
                      <option value="1">1</option>
                      <option value="2">2</option>
                      <option value="3">3</option>
                      <option value="4">4</option>
                       <option value="5">5</option>
                      <option value="6">6</option>
                      <option value="7">7</option>
                      <option value="8">8</option>
                      <option value="9">9</option>
                      <option value="10">10</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="bed">No of Bed:</label>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
                    <select class="form-control" name="no_bed" id="no_bed" style="display:inline-block; width:auto;">
                      <option value="1">1</option>
                      <option value="2">2</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="bedtype">Bed Type:</label>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
                   <select class="form-control" name="bedtype" id="bedtype" style="display:inline-block; width:auto;">
                      <option value="single">single</option>
                      <option value="double">double</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="facility">Facility</label>
                    <textarea class="form-control" rows="5" name="facility" id="facility"></textarea>
                </div>
               <div class="form-group">
                    <label for="price">Price Per Night:</label>
                    <input type="text" class="form-control" name="price" id="price" required>
                </div>
                <button type="submit" class="btn btn-lg btn-primary button" name="submit">Update</button>

               <br>
                <div id="click_here">
                    <a href="../admin.html">Back to Admin Panel</a>
                </div>

            </form>
        </div>
    </div>

    <!-- jQuery -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.1.1/jquery.min.js"></script>
    <script src="../js/db.js"></script>
    <script>
        $(document).ready(function() {
            if (!db.get_session()) {
                window.location.href = "login.html";
            }

            var params = new URLSearchParams(window.location.search);
            var old_room_cat = params.get('roomname');

            if (!old_room_cat) {
                alert("Room category name not specified.");
                window.location.href = "../show_room_cat.html";
                return;
            }

            var cats = db.getRoomCategories();
            var cat = cats.find(function(c) {
                return c.roomname === old_room_cat;
            });

            if (!cat) {
                alert("Room category not found.");
                window.location.href = "../show_room_cat.html";
                return;
            }

            $('#roomname').val(cat.roomname);
            $('#room_qnty').val(cat.room_qnty);
            $('#no_bed').val(cat.no_bed);
            $('#bedtype').val(cat.bedtype);
            $('#facility').val(cat.facility);
            $('#price').val(cat.price);

            $('#edit-room-form').on('submit', function(e) {
                e.preventDefault();
                var roomname = $('#roomname').val();
                var room_qnty = $('#room_qnty').val();
                var no_bed = $('#no_bed').val();
                var bedtype = $('#bedtype').val();
                var facility = $('#facility').val();
                var price = $('#price').val();

                if (!roomname || !price) {
                    alert("Please fill in room name and price.");
                    return;
                }

                var result = db.edit_room_cat(roomname, room_qnty, no_bed, bedtype, facility, price, old_room_cat);
                alert(result);
                window.location.href = "../show_room_cat.html";
            });
        });
    </script>
</body>

</html>
